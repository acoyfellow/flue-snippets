version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      flue:
        patterns:
          - "@flue/*"
      alchemy:
        patterns:
          - "alchemy"
      cloudflare:
        patterns:
          - "@cloudflare/*"
      receipt-libraries:
        patterns:
          - "@acoyfellow/*"
          - "gateproof"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
