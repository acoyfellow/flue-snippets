name: e2e (real deploy)

# On-demand only. Each run deploys a real Worker via alchemy, runs
# gateproof against it, then `alchemy destroy`s it. Cost per snippet
# per run ~$0.0001 (Workers AI llama-scout). The account stays clean
# because every alchemy stage is unique (sha-suffixed) and the
# trap-cleanup ensures destroy always runs.

on:
  workflow_dispatch:
    inputs:
      snippet:
        description: 'Snippet to run (default: all wired snippets)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - 01-lab-receipt
          - 08-do-session

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        snippet:
          - { id: '01-lab-receipt', dir: 'batch-a/01-lab-receipt' }
          - { id: '08-do-session', dir: 'batch-b/08-do-session' }

    name: ${{ matrix.snippet.id }}

    steps:
      - name: Skip if not selected
        if: ${{ github.event.inputs.snippet != 'all' && github.event.inputs.snippet != matrix.snippet.id }}
        run: echo "skipped — input asked for ${{ github.event.inputs.snippet }}" && exit 0

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Run E2E (alchemy deploy + gateproof + alchemy destroy)
        working-directory: ${{ matrix.snippet.dir }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID_E2E }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN_E2E }}
          LAB_URL: https://lab.coey.dev
          GITHUB_SHA: ${{ github.sha }}
          # Use the short SHA as the alchemy stage so each run is its own
          # isolated resource scope, and so destroy actually scopes to
          # this run even if a previous run leaked state.
          STAGE: ci-${{ github.run_id }}
        run: bash run-e2e.sh
