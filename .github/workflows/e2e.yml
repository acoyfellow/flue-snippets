name: e2e (real deploy)

# On-demand only. Each matrix job deploys a real Worker via alchemy,
# runs the snippet's harness against it, then `alchemy destroy`s it.
#
# Two tiers in the matrix:
#   - examples/<product>/   — hello-world per CF product (simplest agent)
#   - recipes/<name>/       — composition snippets (multiple primitives)
#
# Cost per snippet per run ≈ $0.0001 (Workers AI llama scout).

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to run (default: all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - examples
          - recipes
          # examples
          - examples/workers-ai
          - examples/kv
          - examples/r2
          - examples/d1
          - examples/durable-objects
          - examples/ai-gateway
          - examples/queues
          - examples/vectorize
          - examples/browser-rendering
          - examples/worker-loader
          # recipes
          - recipes/lab-receipt
          - recipes/do-session
          - recipes/do-governor
          - recipes/lab-checkpoint
          - recipes/ai-gateway
          - recipes/gateway-lab

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      # Sequential. Workers AI on the personal CF account rate-limits
      # heavily under parallel load.
      max-parallel: 1
      matrix:
        target:
          # examples/
          - examples/workers-ai
          - examples/kv
          - examples/r2
          - examples/d1
          - examples/durable-objects
          - examples/ai-gateway
          - examples/queues
          - examples/vectorize
          - examples/browser-rendering
          - examples/worker-loader
          # recipes/
          - recipes/lab-receipt
          - recipes/do-session
          - recipes/do-governor
          - recipes/lab-checkpoint
          - recipes/ai-gateway
          - recipes/gateway-lab

    name: ${{ matrix.target }}

    steps:
      - name: Skip if not selected
        if: >-
          ${{
            github.event.inputs.target != 'all'
            && github.event.inputs.target != matrix.target
            && !(github.event.inputs.target == 'examples' && startsWith(matrix.target, 'examples/'))
            && !(github.event.inputs.target == 'recipes' && startsWith(matrix.target, 'recipes/'))
          }}
        run: echo "skipped — input asked for ${{ github.event.inputs.target }}" && exit 0

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Run E2E (alchemy deploy + assert + destroy)
        working-directory: ${{ matrix.target }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID_E2E }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN_E2E }}
          LAB_URL: https://lab.coey.dev
          GITHUB_SHA: ${{ github.sha }}
          STAGE: ci-${{ github.run_id }}
          ALCHEMY_CI_STATE_STORE_CHECK: 'false'
        run: bash run-e2e.sh
