name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Each snippet test hits real hosted services (lab.coey.dev, etc).
# The default LAB_URL is hardcoded in test-helpers; override here only if
# you want CI to point at a staging instance.

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run all snippet tests
        run: bun test
        env:
          LAB_URL: https://lab.coey.dev
          # DEJA_PATH intentionally unset — uses tmpdir per test.
          # Add per-snippet secrets here as more tests come online:
          #   CF_ACCOUNT_ID:        ${{ secrets.CF_ACCOUNT_ID }}
          #   AI_GATEWAY_ID:        ${{ secrets.AI_GATEWAY_ID }}
          #   OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          #   ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
